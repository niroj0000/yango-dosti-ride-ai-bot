<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yango Nepal – Driver Support Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Rajdhani:wght@500;700&display=swap');

  :root {
    --yango-red: #FF1744;
    --yango-dark: #0D0D0D;
    --yango-card: #161616;
    --yango-border: #2a2a2a;
    --yango-accent: #FF4D6D;
    --yango-muted: #555;
    --yango-light: #e8e8e8;
    --yango-green: #00E676;
    --yango-yellow: #FFD600;
    --bubble-bot: #1e1e1e;
    --bubble-user: #FF1744;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--yango-dark);
    color: var(--yango-light);
    font-family: 'Noto Sans Devanagari', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 480px;
    background: linear-gradient(135deg, #1a0005 0%, #0D0D0D 60%);
    border-bottom: 2px solid var(--yango-red);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(255,23,68,0.2);
  }

  .header-logo {
    width: 42px;
    height: 42px;
    background: var(--yango-red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: white;
    letter-spacing: 1px;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(255,23,68,0.5);
  }

  .header-info { flex: 1; }
  .header-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.5px;
  }
  .header-sub {
    font-size: 11px;
    color: var(--yango-green);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: var(--yango-green);
    border-radius: 50%;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Chat window */
  .chat-window {
    width: 100%;
    max-width: 480px;
    flex: 1;
    padding: 16px 14px 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: calc(100vh - 140px);
    max-height: calc(100vh - 140px);
  }

  /* Bubbles */
  .bubble-wrap {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bubble-wrap.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .avatar.bot { background: #2a0008; border: 1.5px solid var(--yango-red); font-size: 16px; }
  .avatar.user { background: #1a1a1a; border: 1.5px solid #444; }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.65;
  }
  .bubble.bot {
    background: var(--bubble-bot);
    border: 1px solid var(--yango-border);
    border-bottom-left-radius: 4px;
    color: #ddd;
  }
  .bubble.user {
    background: var(--bubble-user);
    border-bottom-right-radius: 4px;
    color: white;
    font-weight: 500;
  }

  .bubble b { color: var(--yango-yellow); }
  .bubble .tag {
    display: inline-block;
    background: rgba(255,23,68,0.15);
    border: 1px solid rgba(255,23,68,0.4);
    color: var(--yango-accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    margin: 3px 2px;
  }
  .bubble .ok { color: var(--yango-green); font-weight: 600; }
  .bubble .warn { color: var(--yango-yellow); font-weight: 600; }
  .bubble .bad { color: var(--yango-red); font-weight: 600; }

  /* Quick reply chips */
  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 4px 0 4px 40px;
    animation: fadeUp 0.4s ease;
  }
  .chip {
    background: #1a1a1a;
    border: 1.5px solid var(--yango-border);
    color: #ccc;
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Noto Sans Devanagari', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .chip:hover, .chip:active {
    border-color: var(--yango-red);
    color: white;
    background: rgba(255,23,68,0.1);
  }

  /* Input area */
  .input-area {
    width: 100%;
    max-width: 480px;
    padding: 10px 12px;
    background: #111;
    border-top: 1px solid var(--yango-border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    position: sticky;
    bottom: 0;
  }
  .input-area textarea {
    flex: 1;
    background: #1c1c1c;
    border: 1.5px solid var(--yango-border);
    border-radius: 20px;
    color: white;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 13px;
    padding: 9px 14px;
    resize: none;
    outline: none;
    max-height: 80px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color: var(--yango-red); }
  .input-area textarea::placeholder { color: #555; }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--yango-red);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.2s;
    box-shadow: 0 2px 10px rgba(255,23,68,0.4);
  }
  .send-btn:hover { transform: scale(1.08); background: #ff3355; }
  .send-btn:active { transform: scale(0.95); }

  /* Typing indicator */
  .typing {
    display: flex; gap: 5px; align-items: center; padding: 10px 14px;
    background: var(--bubble-bot); border: 1px solid var(--yango-border);
    border-radius: 16px; border-bottom-left-radius: 4px;
    width: fit-content; max-width: 80px;
  }
  .typing span {
    width: 7px; height: 7px;
    background: #555; border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%,60%,100% { transform: translateY(0); background: #555; }
    30% { transform: translateY(-5px); background: var(--yango-red); }
  }

  .timestamp {
    font-size: 10px;
    color: #444;
    text-align: center;
    margin: 4px 0;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>

const chatWindow = document.getElementById('chatWindow');

function scrollBottom() {

function addTimestamp() {

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = formatText(text);

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatWindow.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function formatText(text) {
  return text
    .replace(/\n/g, '<br>')
    .replace(/\*(.*?)\*/g, '<b>$1</b>');
}

function addChips() {
  const wrap = document.createElement('div');
  wrap.className = 'chips-wrap';
  QUICK_REPLIES.forEach(qr => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = qr.label;
    chip.onclick = () => {
      removeChips();
      processUserMessage(qr.key);
      // Show as user bubble
      addBubble(qr.label, 'user');
    };
    wrap.appendChild(chip);
  });
  chatWindow.appendChild(wrap);
  scrollBottom();
}

function removeChips() {
  document.querySelectorAll('.chips-wrap').forEach(e => e.remove());
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap bot';
  wrap.id = 'typingIndicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🤖';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(avatar);
  wrap.appendChild(t);
  chatWindow.appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

// ─── Response logic ───────────────────────────────────────────────────────────
function findAnswer(input) {
  const lower = input.toLowerCase();

  if (GREETINGS.some(g => lower.includes(g))) {
    return `नमस्ते! 🙏 म Yango Nepal को Driver Support Bot हुँ।\n\nतपाईंको कुनै पनि प्रश्नको जवाफ दिन यहाँ छु। तलका topic मध्ये कुनै छनोट गर्नुस् वा आफ्नै question type गर्नुस्।`;
  }

  if (THANKS.some(g => lower.includes(g)) && lower.length < 20) {
    return `खुसी लाग्यो! 😊 अरू कुनै प्रश्न छ भने सोध्नुस्। म सधैं यहाँ छु।`;
  }

  for (const faq of FAQ) {
    if (faq.keywords.some(k => lower.includes(k.toLowerCase()))) {
      return faq.answer;
    }
  }

  return `माफ गर्नुस्, मैले यो प्रश्न राम्ररी बुझिनँ। 🙏\n\nकृपया:\n• <b>Fleetroom Support</b> मा खोज्नुस्\n• वा <b>support@yango.com</b> मा email गर्नुस्\n• वा <b>Google Form</b> मार्फत report गर्नुस् (Screenshot + Trip ID सहित)\n\nतलका common topics मा click गर्नुस् 👇`;
}

function processUserMessage(text) {
  waitingForResponse = true;
  showTyping();

  setTimeout(() => {
    hideTyping();
    const answer = findAnswer(text);
    addTimestamp();
    addBubble(answer, 'bot');
    addChips();
    waitingForResponse = false;
  }, BOT_DELAY);
}

function handleSend() {
  if (waitingForResponse) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  removeChips();
  addBubble(text, 'user');
  processUserMessage(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

// Auto-resize textarea
document.getElementById('userInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// ─── Init message ─────────────────────────────────────────────────────────────
window.onload = () => {
  addTimestamp();
  addBubble(`नमस्ते! 🙏 <b>Yango Nepal Driver Support Bot</b> मा स्वागत छ!\n\nम तपाईंको यी विषयमा मद्दत गर्न सक्छु:\n\n• Pro Level किन घट्छ?\n• Passenger ले cancel गर्दा के हुन्छ?\n• Bonus किन आएन?\n• Payment र Payout\n• Branding Photo issues\n• र अरू धेरै...\n\n👇 तलका buttons मा click गर्नुस् वा आफ्नो प्रश्न type गर्नुस्!`, 'bot');
  addChips();
};
</script>
